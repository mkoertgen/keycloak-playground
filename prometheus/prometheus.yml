global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: "local-dev"
    cluster: "keycloak-poc"

rule_files:
  - "rules/*.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"

  - job_name: "keycloak"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["localhost:9000"]
        labels:
          service: "keycloak"
          instance: "keycloak-local"

    # Scrape more frequently for demo purposes
    scrape_interval: 10s

  # Optional: Add test-client health endpoint if it exposes metrics
  - job_name: "test-client"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["localhost:3000"]
        labels:
          service: "test-client"
          instance: "test-client-local"
    scrape_interval: 30s
