global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: "local-dev-docker"
    cluster: "keycloak-poc"

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]
        labels:
          service: "prometheus"

  - job_name: "keycloak"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["keycloak:9000"]
        labels:
          service: "keycloak"
          instance: "keycloak-docker"

    # Scrape more frequently for demo purposes
    scrape_interval: 10s

  - job_name: "test-client"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["test-client:3000"]
        labels:
          service: "test-client"
          instance: "test-client-docker"
    scrape_interval: 30s
