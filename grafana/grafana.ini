# https://grafana.com/docs/grafana/latest/setup-grafana/configure-grafana/#default_home_dashboard_path
[server]
protocol = http
http_port = 3001
domain = grafana.localhost

[security]
admin_user = admin
admin_password = admin
allow_embedding = true

[auth.anonymous]
enabled = true
org_role = Viewer

[users]
allow_sign_up = false

[log]
mode = console
level = info

[paths]
provisioning = /etc/grafana/provisioning

[dashboards]
default_home_dashboard_path = /etc/grafana/provisioning/dashboards/home.json
